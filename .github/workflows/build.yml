name: Build

on:
  [push,pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install binutils
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: binutils-m68k-linux-gnu
        
    - name: Build
      run: ./build.sh
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        path: init.bin
